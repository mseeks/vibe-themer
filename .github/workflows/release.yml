# Release Vibe Themer to the VS Code Marketplace (and Open VSX) on a version tag.
#
# Cutting a release:
#   1. Bump "version" in package.json and update CHANGELOG.md; commit to main.
#   2. Publish a GitHub Release on a matching tag (e.g. v2.1.1) — by hand, with your
#      notes — or just push the tag. Either way the tag push triggers this workflow.
#   3. It verifies the tag matches the version, builds a production VSIX, publishes it
#      to the Marketplace, and attaches the .vsix to the GitHub Release (if one exists).
#
# Required repository secrets:
#   VSCE_PAT — Azure DevOps PAT for the "mseeks" Marketplace publisher (required)
#   OVSX_PAT — Open VSX access token (optional; the Open VSX step self-skips if unset)
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # upload the .vsix asset to the GitHub Release

jobs:
  release:
    name: publish (marketplace · open vsx · attach vsix)
    runs-on: ubuntu-latest
    env:
      # Exposed as an env var (not referenced as a secret directly) so the Open VSX
      # step can self-skip with `if: env.OVSX_PAT != ''` when the token isn't set.
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG  tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::tag v$TAG does not match package.json $PKG — bump the version, commit, then tag"; exit 1; }

      # Don't publish a red build. vsce:prepublish already covers types/lint/bundle;
      # this adds the node:test suite, which a tag push wouldn't otherwise run.
      - run: npm test

      - name: Package production VSIX
        run: |
          VSIX="vibe-themer-${GITHUB_REF_NAME}.vsix"
          npx --yes @vscode/vsce package --out "$VSIX"
          echo "VSIX=$VSIX" >> "$GITHUB_ENV"

      - name: Publish to the VS Code Marketplace
        run: npx --yes @vscode/vsce publish --packagePath "$VSIX"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx --yes ovsx publish "$VSIX" -p "$OVSX_PAT"

      # The GitHub Release is created by hand (with its own notes); this just attaches
      # the exact published .vsix to it. Best-effort: if no release exists for the tag
      # (e.g. a bare tag push), skip with a notice instead of failing the run — the
      # Marketplace publish above is the part that matters.
      - name: Attach the VSIX to the GitHub Release
        run: gh release upload "$GITHUB_REF_NAME" "$VSIX" --clobber || echo "::notice::no GitHub Release for $GITHUB_REF_NAME — skipped attaching the VSIX"
        env:
          GH_TOKEN: ${{ github.token }}
